<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Froms in HTML</title>
    </head>
    <body>
        <h1>Format ne HTML</h1>

        <form>
            <input
                type="text"
                placeholder="Emri dhe mbiemri"
                value="Enes Shala"
            />
            <br />
            <br />
            <input type="password" placeholder="Password" /> <br />
            <br />
            <input type="number" placeholder="Mosha juaj" /> <br />
            <br />
            <input type="datetime-local" /> <br />
            <br />
            <input type="file" /> <br />
            <br />

            <select name="cars" id="cars">
                <option value="volvo">Volvo</option>
                <option value="saab">Saab</option>
                <option value="mercedes">Mercedes</option>
                <option value="audi">Audi</option>
            </select>
            <br />
            <br />

            <input type="radio" id="html" name="fav_language" value="HTML" />
            <label for="html">HTML</label><br />
            <input type="radio" id="css" name="fav_language" value="CSS" />
            <label for="css">CSS</label><br />
            <input
                type="radio"
                id="javascript"
                name="fav_language"
                value="JavaScript"
            />
            <label for="javascript">JavaScript</label>

            <br />
            <br />

            <input type="checkbox" id="vehicle1" name="vehicle1" value="Bike" />
            <label for="vehicle1"> I have a bike</label><br />
            <input type="checkbox" id="vehicle2" name="vehicle2" value="Car" />
            <label for="vehicle2"> I have a car</label><br />
            <input type="checkbox" id="vehicle3" name="vehicle3" value="Boat" />
            <label for="vehicle3"> I have a boat</label><br />
            <br />

            <textarea name="" id="" rows="10" cols="50" re> </textarea>

            <br />
            <br />

            <input type="submit" value="Login" />
        </form>

        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d736.4566835874775!2d21.15250812204575!3d42.632825005383864!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x13549ffe637b0dd7%3A0x4594c50f0099efc5!2sAlbi%20Mall!5e1!3m2!1sen!2s!4v1768334982678!5m2!1sen!2s"
            width="600"
            height="450"
            style="border: 0"
            allowfullscreen=""
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
        ></iframe>

        <iframe
            width="560"
            height="315"
            src="https://www.youtube.com/embed/xPPLbEFbCAo?si=egCLLOWMYZwtKKD0"
            title="YouTube video player"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen

        <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d10894.910690053051!2d7.459565235337277!3d46.94739121310324!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x478e39dc1e4171bd%3A0xa279d54914bfdfb9!2sBearPark!5e0!3m2!1sen!2s!4v1768502588840!5m2!1sen!2s" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </body>
</html>
